<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - AIBloom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
<a class="skip-link" href="#main-content">Перейти к форме входа</a>
<div id="appStatus" class="visually-hidden" role="status" aria-live="polite" aria-atomic="true"></div>

<nav class="navbar navbar-expand-lg navbar-light sticky-top shadow-sm" aria-label="Основная навигация">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html" aria-label="AIBloom, перейти на главную страницу">
            <span class="brand-flower" aria-hidden="true">🏵️</span> AIBloom
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Поиск</a>
            <a class="nav-link active" href="login.html" aria-current="page">Вход</a>
            <!-- Кнопка переключает светлую и тёмную тему на всех страницах -->
            <button type="button" class="btn btn-outline-primary ms-lg-3 theme-toggle" id="themeToggle">Тёмная тема</button>
        </div>
    </div>
</nav>

<main id="main-content" class="container mt-5" tabindex="-1">
    <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="col-md-5 col-lg-4">
            <section class="card border-0 shadow-sm p-4" aria-labelledby="loginTitle">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <h1 id="loginTitle" class="h3 fw-bold" style="color: var(--bloom-green);">С возвращением!</h1>
                        <p id="loginDescription" class="text-muted small mb-0">Войдите, чтобы ухаживать за своим садом моделей.</p>
                    </div>

                    <form id="loginForm" aria-describedby="loginDescription">
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label small fw-bold text-uppercase">Ваш Email</label>
                            <input type="email" class="form-control" id="loginEmail" name="email" placeholder="name@example.com" autocomplete="username" inputmode="email" required>
                        </div>

                        <div class="mb-4">
                            <label for="loginPassword" class="form-label small fw-bold text-uppercase">Пароль</label>
                            <input type="password" class="form-control" id="loginPassword" name="password" placeholder="Введите пароль" autocomplete="current-password" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Войти в оранжерею</button>

                        <div class="text-center">
                            <span class="small text-muted">Еще не с нами? </span>
                            <a href="register.html" class="small fw-bold text-decoration-none touch-link auth-link">Создать аккаунт</a>
                        </div>
                    </form>
                </div>
            </section>

            <div class="text-center mt-4">
                <a href="index.html" class="text-muted small text-decoration-none touch-link">← Вернуться к поиску моделей</a>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
